<!doctype>
<html lang="sv">
  <head>
    <meta charset="utf-8">
    <title>Galleri</title>
    <style>
      .gallery{
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      }
      .gallery img {
  width: 100%;
  height: auto;
  display: block;
}
    </style>
  </head>
  <body>
    <h1>Bildgalleri</h1>

    <div class="gallery">
      <img src="PXL_20260306_141638336.jpg" alt="naturbild ett">
      <img src="PXL_20260306_145749193.jpg" alt="naturbild två">
      <img src="PXL_20260306_155337941.jpg" alt="naturbild tre">
    </div>
  </body>
</html>
